<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - My Web Project</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f9; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #message { margin-top: 15px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username (admin)">
        <input type="password" id="password" placeholder="Password (password123)">
        <button onclick="handleLogin()">Sign In</button>
        <div id="message"></div>
    </div>

    <script>
        async function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');

            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });

            const result = await response.json();
            
            if (response.ok) {
                // Set a cookie manually for simplicity
                document.cookie = `user_session=${user}; path=/`;
                msgDiv.style.color = "green";
                msgDiv.innerText = "Success! Redirecting...";
                // Redirect to the home page after 1 second
                setTimeout(() => { window.location.href = "/"; }, 1000);
            } else {
                msgDiv.style.color = "red";
                msgDiv.innerText = "❌ " + result.message;
            }
        }
	

    </script>
</body>
</html>
