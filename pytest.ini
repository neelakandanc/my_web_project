[pytest]
# Register markers to provide structured metadata for AI RTS tools
markers =
    auth: Tests related to the Authentication module
    catalog: Tests related to the Product Catalog module
    orders: Tests related to the Order Management module
    profile: Tests related to the User Profile module
    prio_high: Critical path tests for rapid regression selection
    prio_medium: Standard functional and integration regression
    prio_low: Edge cases and non-critical smoke tests

# Configure test discovery and execution
testpaths = tests
python_files = test_*.py
python_functions = test_*

# Strict markers ensure all tags are registered before being used
addopts = --strict-markers -v --tb=short
